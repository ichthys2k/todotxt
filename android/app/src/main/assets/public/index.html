    <!-- Theme detector & Splash screen styles -->
    <script>
      (function() {
        const theme = localStorage.getItem('todo_txt_app_theme') || 'dark';
        let activeTheme = theme;
        if (theme === 'system') {
          activeTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.classList.add(activeTheme);
        const themeColor = activeTheme === 'dark' ? '#020617' : '#ffffff';
        const metaThemeColor = document.querySelector('meta[name="theme-color"]');
        if (metaThemeColor) {
          metaThemeColor.setAttribute('content', themeColor);
        }

        // Play splash sound immediately
        try {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if (AudioContext) {
            const ctx = new AudioContext();
            const now = ctx.currentTime;

            const osc1 = ctx.createOscillator();
            const osc2 = ctx.createOscillator();
            const gain = ctx.createGain();

            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(1318.51, now); // E6
            
            osc2.type = 'sine';
            osc2.frequency.setValueAtTime(1975.53, now); // B6

            gain.gain.setValueAtTime(0, now);
            gain.gain.linearRampToValueAtTime(0.08, now + 0.015);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.6);

            osc1.connect(gain);
            osc2.connect(gain);
            gain.connect(ctx.destination);

            osc1.start(now);
            osc2.start(now);
            
            osc1.stop(now + 0.6);
            osc2.stop(now + 0.6);
          }
        } catch (e) {
          console.warn('Splash audio autoplay blocked by browser:', e);
        }
      })();
    </script>
